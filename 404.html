<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>404 | phrug.net</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181a1c;
    --sub-alt:#23262a;
    --sub:#6e747a;
    --text:#c2c7cc;
    --red:#d13523;
    --green:#91c04b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:"Roboto Mono",monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .site-title{
    position:fixed;
    top:24px;
    left:24px;
    font-size:18px;
    font-weight:700;
    color:var(--green);
    text-decoration:none;
    text-transform:lowercase;
    line-height:1;
  }
  .error-wrap{text-align:center;}
  .tagline{
    margin:0 0 18px;
    color:var(--sub);
    font-size:15px;
    text-transform:lowercase;
  }
  .code{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:24px;
    font-family:"Lexend Deca",sans-serif;
    font-size:clamp(82px,18vw,172px);
    font-weight:700;
    line-height:.78;
    color:var(--red);
    text-transform:lowercase;
  }
  .lamp{
    width:clamp(72px,14vw,134px);
    aspect-ratio:1;
    border:3px solid var(--sub);
    border-radius:50%;
    position:relative;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .lamp::after{
    content:"";
    position:absolute;
    width:18%;
    aspect-ratio:1;
    border-radius:50%;
    background:var(--text);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 18px rgba(194,199,204,.16);
  }
  @media (max-width:460px){
    .code{gap:14px;}
    .lamp{border-width:2px;}
  }
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <a class="site-title" href="/">phrug.net</a>
  <main class="error-wrap" aria-labelledby="error-title">
    <p class="tagline">error</p>
    <h1 class="code" id="error-title" aria-label="404">
      <span>4</span>
      <span class="lamp" aria-hidden="true"></span>
      <span>4</span>
    </h1>
  </main>
</body>
</html>
